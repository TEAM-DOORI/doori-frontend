# ─────────────────────────────────────────────────────────────
# PR 이벤트에 따라 Notion DB 행의 상태와 PR URL을 업데이트합니다.
#
# [트리거]
#   pull_request: opened, ready_for_review, closed
#
# [상태 전환 흐름]
#
#   PR opened / ready_for_review (Draft 포함)
#     └─ 현재 상태가 "리뷰중" 또는 "완료"  →  skip (중복 방지)
#     └─ 그 외                              →  "리뷰중" + PR URL 갱신
#
#   PR closed + merged == true
#     └─ "완료" + PR URL 갱신
#
#   PR closed + merged == false (머지 없이 닫힘)
#     └─ skip (issue-closed-notion.yml에서 처리)
#
# [이슈 번호 파싱]
#   PR 본문의 아래 키워드 + #N 을 찾아 연결된 이슈 모두 처리
#   closes / close / closed / fixes / fix / fixed / resolves / resolve / resolved
#   예) Closes #123
#       Fixes #456   ← 여러 줄 모두 처리
#
# [Notion 속성]
#   상태       → Status  ("리뷰중" / "완료")
#   Github PR  → URL
#
# [GitHub Secrets]
#   NOTION_API_KEY, NOTION_DATABASE_ID
# ─────────────────────────────────────────────────────────────

name: Update Notion on PR events

on:
  pull_request:
    types: [opened, ready_for_review, closed]

permissions:
  contents: read

jobs:
  update-notion:
    name: Sync PR status to Notion
    runs-on: ubuntu-latest
    steps:
      - name: Update Notion page
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          PR_ACTION: ${{ github.event.action }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set -euo pipefail
          echo "action: ${PR_ACTION}, merged: ${PR_MERGED}"

          # 머지 없이 닫힌 PR은 issue-closed-notion.yml에서 처리
          if [ "${PR_ACTION}" = "closed" ] && [ "${PR_MERGED}" != "true" ]; then
            echo "머지 없이 닫힌 PR입니다. skip합니다."
            exit 0
          fi

          # 이슈 순회 전에 적용할 상태를 미리 결정
          if [ "${PR_ACTION}" = "closed" ] && [ "${PR_MERGED}" = "true" ]; then
            NEW_STATUS="완료"
          else
            NEW_STATUS="리뷰중"
          fi
          echo "적용할 노션 상태: ${NEW_STATUS}"

          # PR 본문에서 Closes/Fixes/Resolves #N 키워드로 이슈 번호 전체 추출
          ISSUE_NUMBERS=$(python3 <<'PY'
          import os, re
          body = os.environ.get("PR_BODY") or ""
          pattern = re.compile(
              r'(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)',
              re.IGNORECASE
          )
          print("\n".join(pattern.findall(body)))
          PY
          )

          if [ -z "$ISSUE_NUMBERS" ]; then
            echo "PR 본문에서 이슈 번호를 찾을 수 없습니다. skip합니다."
            exit 0
          fi
          echo "파싱된 이슈 번호 목록:"
          echo "$ISSUE_NUMBERS"

          # 이슈 번호마다 노션 행을 찾아 상태·PR URL 업데이트
          while IFS= read -r ISSUE_NUMBER; do
            [ -z "$ISSUE_NUMBER" ] && continue
            echo "──────────────────────────────"
            echo "처리 중: 이슈 #${ISSUE_NUMBER}"

            # Github 이슈 번호 속성으로 노션 행 검색
            QUERY_JSON=$(jq -n \
              --argjson number "$ISSUE_NUMBER" \
              '{
                filter: {
                  property: "Github 이슈 번호",
                  number: { equals: $number }
                }
              }')
            QUERY_RESPONSE=$(curl -sS \
              -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "$QUERY_JSON")
            PAGE_ID=$(echo "$QUERY_RESPONSE" | jq -r '.results[0].id // empty')

            if [ -z "$PAGE_ID" ]; then
              echo "이슈 #${ISSUE_NUMBER}에 해당하는 노션 행 없음. skip합니다."
              continue
            fi
            echo "노션 페이지 ID: ${PAGE_ID}"

            CURRENT_STATUS=$(echo "$QUERY_RESPONSE" | jq -r '.results[0].properties["상태"].status.name // empty')
            echo "현재 노션 상태: ${CURRENT_STATUS}"

            # "리뷰중" 전환 시 이미 리뷰중·완료면 skip (역행 방지)
            if [ "$NEW_STATUS" = "리뷰중" ]; then
              if [ "${CURRENT_STATUS}" = "리뷰중" ] || [ "${CURRENT_STATUS}" = "완료" ]; then
                echo "이미 '${CURRENT_STATUS}' 상태입니다. skip합니다."
                continue
              fi
            fi

            # 상태 + PR URL 갱신
            PATCH_JSON=$(jq -n \
              --arg status "$NEW_STATUS" \
              --arg pr_url "$PR_URL" \
              '{
                properties: {
                  "상태": { status: { name: $status } },
                  "Github PR": { url: $pr_url }
                }
              }')
            HTTP_CODE=$(curl -sS -o /tmp/notion_patch.json -w "%{http_code}" \
              -X PATCH "https://api.notion.com/v1/pages/${PAGE_ID}" \
              -H "Authorization: Bearer ${NOTION_TOKEN}" \
              -H "Notion-Version: 2022-06-28" \
              -H "Content-Type: application/json" \
              -d "$PATCH_JSON")
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "Notion API failed with HTTP $HTTP_CODE"
              cat /tmp/notion_patch.json
              exit 1
            fi
            echo "완료: 이슈 #${ISSUE_NUMBER} → 상태=${NEW_STATUS}, PR URL 갱신"
          done <<< "$ISSUE_NUMBERS"
